<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Human Repair Log v2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 5px; }

    /* DASHBOARD */
    #dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .case-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .case-card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    /* TAGS */
    .tag {
      background: #334155;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 3px;
      display: inline-block;
      font-size: 12px;
    }

    /* BODY MAP */
    .body-map {
      margin: 20px 0;
    }

    .body-map img {
      width: 220px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
    }

    /* CASE VIEW */
    #caseView {
      max-width: 600px;
      margin: 20px auto;
      text-align: left;
      display: none;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      background: #334155;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>🧠 Human Repair Log v2</h1>
<p>Interactive injury case system</p>

<!-- 🧭 DASHBOARD -->
<div id="dashboard"></div>

<!-- 🧍 BODY MAP -->
<h2>🧍 Body Map</h2>

<div class="body-map">
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Gray1240.png">
</div>

<!-- 📄 CASE VIEW -->
<div id="caseView">
  <button onclick="closeCase()">⬅ Back</button>
  <div id="caseContent"></div>
</div>

<script>
/* 🧠 CASE DATABASE */
const cases = [
  {
    id: "case1",
    title: "Ankle Sprain",
    emoji: "🦶",
    type: "Ligament",
    severity: "Moderate",
    region: "Ankle",
    symptoms: ["Swelling", "Pain during movement", "Limited mobility"],
    timeline: ["Day 1: Injury", "Day 3: Peak swelling", "Week 2: Recovery starts"]
  },
  {
    id: "case2",
    title: "Wrist Fracture",
    emoji: "✋",
    type: "Bone",
    severity: "Severe",
    region: "Wrist",
    symptoms: ["Sharp pain", "Swelling", "Loss of grip"],
    timeline: ["Day 1: Fracture", "Week 1: Cast applied", "Week 4: Healing"]
  },
  {
    id: "case3",
    title: "Shoulder Dislocation",
    emoji: "💪",
    type: "Joint",
    severity: "Severe",
    region: "Shoulder",
    symptoms: ["Deformity", "Pain", "Limited movement"],
    timeline: ["Immediate reduction", "Week 1: Sling", "Week 3: Rehab"]
  }
];

/* 🧭 DASHBOARD */
const dashboard = document.getElementById("dashboard");

cases.forEach(c => {
  const card = document.createElement("div");
  card.className = "case-card";

  card.innerHTML = `
    <h3>${c.emoji} ${c.title}</h3>
    <p><span class="tag">${c.type}</span> <span class="tag">${c.severity}</span></p>
  `;

  card.onclick = () => openCase(c.id);

  dashboard.appendChild(card);
});

/* 📄 OPEN CASE */
function openCase(id) {
  const c = cases.find(x => x.id === id);

  document.getElementById("caseView").style.display = "block";
  document.getElementById("dashboard").style.display = "none";

  document.getElementById("caseContent").innerHTML = `
    <h2>${c.emoji} ${c.title}</h2>

    <p>
      <span class="tag">${c.type}</span>
      <span class="tag">${c.severity}</span>
      <span class="tag">${c.region}</span>
    </p>

    <h3>Symptoms</h3>
    <ul>
      ${c.symptoms.map(s => `<li>${s}</li>`).join("")}
    </ul>

    <h3>📊 Timeline</h3>
    <ul>
      ${c.timeline.map(t => `<li>${t}</li>`).join("")}
    </ul>
  `;
}

/* 🔙 CLOSE CASE */
function closeCase() {
  document.getElementById("caseView").style.display = "none";
  document.getElementById("dashboard").style.display = "grid";
}
</script>

</body>
</html>
